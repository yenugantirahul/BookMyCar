# Docker Compose — staging / integration parity
# Local dev: use `pnpm dev:backend` (faster, no Docker overhead)
# Staging:   `docker compose up --build`
#
# Build context MUST be the monorepo root:
#   docker compose up --build

services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
      target: runner
    container_name: carrental-backend
    ports:
      - "${PORT:-3001}:3001"
    # Reads from apps/backend/.env — keep secrets out of this file
    env_file:
      - apps/backend/.env
    restart: unless-stopped
    networks:
      - carrental-network
    healthcheck:
      # Liveness check — confirms the process is alive and env vars are valid.
      # Phase 2 adds /api/v1/health/ready for DB-connected readiness checks.
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3001/api/v1/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

networks:
  carrental-network:
    driver: bridge
